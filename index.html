<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>مساعد الأستاذ</title>
<style>
/* ===== RESET & BASE ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:15px;-webkit-text-size-adjust:100%}
body{
  font-family:'Segoe UI',Tahoma,Arial,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;min-height:100dvh;
  overscroll-behavior:none;
  transition:background .25s,color .25s;
}
button{font-family:inherit;font-size:inherit;border:none;background:none;cursor:pointer;color:inherit}
input,textarea,select{font-family:inherit;font-size:inherit;border:none;outline:none;background:none;color:inherit}
a{color:inherit;text-decoration:none}
ul,ol{list-style:none}

/* ===== CSS VARIABLES – Light Mode ===== */
:root{
  --accent:#3B4FC0;
  --accent-dark:#2D3D9E;
  --accent-light:#EBF0FB;
  --surface:#FFFFFF;
  --surface-2:#F7F8FC;
  --bg:#F0F2F8;
  --border:#E5E8F2;
  --border-2:#CDD2E8;
  --text:#1C2340;
  --text-2:#4B5572;
  --text-3:#8892B0;
  --danger:#D04040;
  --danger-light:#FDEAEA;
  --amber:#E09B2F;
  --amber-light:#FEF3DC;
  --green:#178A6F;
  --green-light:#E0F5EE;
  --purple:#8E44AD;
  --purple-light:#F5EEF8;
  --radius:10px;
  --radius-lg:14px;
  --radius-xl:20px;
  --mono:'SF Mono','Fira Code',monospace;
  --nav-h:64px;
  --topbar-h:56px;
  --c1:#3B82F6;--c1-bg:#EBF5FB;
  --c2:#E55B20;--c2-bg:#FEF0E8;
  --math:#3B4FC0;--math-bg:#EBF0FB;
  --phy:#E09B2F;--phy-bg:#FEF3DC;
  --svt:#178A6F;--svt-bg:#E0F5EE;
  --drawer-w:280px;
  --shadow:0 2px 12px rgba(28,35,64,.10);
  --shadow-lg:0 6px 24px rgba(28,35,64,.14);
}
/* Dark Mode */
body.dark{
  --surface:#1E2440;
  --surface-2:#252B48;
  --bg:#131729;
  --border:#2C3356;
  --border-2:#374070;
  --text:#E8EAF6;
  --text-2:#A0AACB;
  --text-3:#5A6490;
  --accent-light:#2D3570;
  --danger-light:#3D1A1A;
  --amber-light:#3D2E0A;
  --green-light:#0D2920;
  --purple-light:#2A1A38;
  --c1-bg:#1A2E4A;--c2-bg:#3D1E0A;
  --math-bg:#1A1F48;--phy-bg:#3D2E0A;--svt-bg:#0D2920;
  --shadow:0 2px 12px rgba(0,0,0,.3);
  --shadow-lg:0 6px 24px rgba(0,0,0,.4);
}

/* ===== LAYOUT ===== */
#app{
  display:flex;flex-direction:column;
  min-height:100vh;min-height:100dvh;
  max-width:520px;margin:0 auto;
  background:var(--bg);
  position:relative;
}

/* ===== TOPBAR ===== */
.topbar{
  position:sticky;top:0;z-index:40;
  height:var(--topbar-h);
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;
  padding:0 12px;gap:8px;
  box-shadow:var(--shadow);
  transition:background .25s,border-color .25s;
}
.topbar-title{font-size:17px;font-weight:700;flex:1;text-align:center}
.back-btn,.menu-btn{
  width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  border-radius:10px;color:var(--accent);background:var(--accent-light);
  transition:background .15s;
}
.topbar-right{display:flex;align-items:center;gap:6px}
.admin-badge{
  font-size:10px;font-weight:800;padding:3px 8px;
  border-radius:6px;background:var(--amber);color:#fff;
}
.search-btn{
  width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  border-radius:10px;color:var(--text-3);background:var(--surface-2);
}

/* ===== PAGE CONTENT ===== */
#page-content{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding-bottom:calc(var(--nav-h) + 12px + env(safe-area-inset-bottom));
  -webkit-overflow-scrolling:touch;
}
.section{display:none;padding:14px 14px 4px;animation:fadeIn .2s ease}
.section.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ===== BOTTOM NAV ===== */
.bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:520px;
  height:calc(var(--nav-h) + env(safe-area-inset-bottom));
  padding-bottom:env(safe-area-inset-bottom);
  background:var(--surface);
  border-top:1px solid var(--border);
  display:flex;align-items:stretch;
  z-index:50;
  box-shadow:0 -2px 16px rgba(28,35,64,.08);
  transition:background .25s,border-color .25s;
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:3px;
  font-size:10px;font-weight:700;color:var(--text-3);
  transition:color .15s;position:relative;
}
.nav-btn svg{width:22px;height:22px;transition:transform .15s}
.nav-btn.active{color:var(--accent)}
.nav-btn.active svg{transform:scale(1.12)}
.nav-dot{
  position:absolute;top:7px;right:calc(50% - 16px);
  min-width:16px;height:16px;border-radius:10px;
  background:var(--danger);color:#fff;font-size:10px;font-weight:700;
  display:none;align-items:center;justify-content:center;
  padding:0 4px;
}
.nav-dot.show{display:flex}

/* ===== FAB ===== */
.fab{
  position:fixed;
  bottom:calc(var(--nav-h) + 14px + env(safe-area-inset-bottom));
  left:16px;
  width:52px;height:52px;border-radius:16px;
  background:var(--accent);color:#fff;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 18px rgba(59,79,192,.38);
  z-index:45;
  transition:transform .15s,box-shadow .15s,background .15s;
}
.fab:active{transform:scale(.93);box-shadow:0 2px 8px rgba(59,79,192,.25)}

/* ===== DRAWER ===== */
.drawer-overlay{
  position:fixed;inset:0;z-index:60;
  background:rgba(10,15,35,.55);
  display:none;backdrop-filter:blur(3px);
  transition:opacity .25s;
}
.drawer-overlay.show{display:block}
.drawer{
  position:fixed;top:0;right:-100%;bottom:0;
  width:var(--drawer-w);max-width:85vw;
  background:var(--surface);
  z-index:65;
  transition:right .28s cubic-bezier(.32,.72,0,1);
  display:flex;flex-direction:column;
  box-shadow:-4px 0 24px rgba(0,0,0,.18);
  overflow-y:auto;
}
.drawer.open{right:0}
.drawer-head{
  padding:calc(env(safe-area-inset-top) + 16px) 20px 16px;
  background:var(--accent);color:#fff;
  border-bottom:1px solid rgba(255,255,255,.15);
}
.drawer-head h2{font-size:18px;font-weight:800;margin-bottom:2px}
.drawer-head p{font-size:12px;opacity:.8}
.drawer-close{
  position:absolute;top:calc(env(safe-area-inset-top) + 14px);
  left:14px;width:32px;height:32px;
  display:flex;align-items:center;justify-content:center;
  border-radius:8px;background:rgba(255,255,255,.18);color:#fff;
}
.drawer-section{padding:10px 0}
.drawer-label{
  font-size:10px;font-weight:800;color:var(--text-3);
  letter-spacing:.6px;text-transform:uppercase;
  padding:6px 20px 4px;
}
.drawer-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 20px;font-size:14px;font-weight:600;
  color:var(--text-2);transition:background .1s,color .1s;
  cursor:pointer;position:relative;
}
.drawer-item:active{background:var(--accent-light)}
.drawer-item.active{
  color:var(--accent);background:var(--accent-light);
  border-right:3px solid var(--accent);
}
.drawer-item .di-icon{
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.drawer-item .di-count{
  margin-right:auto;
  font-size:11px;font-weight:700;font-family:var(--mono);
  background:var(--bg);color:var(--text-3);
  padding:2px 8px;border-radius:20px;
}
.drawer-divider{height:1px;background:var(--border);margin:4px 0}

/* ===== CARDS & PANELS ===== */
.panel{
  background:var(--surface);border-radius:var(--radius-lg);
  border:1px solid var(--border);margin-bottom:12px;
  overflow:hidden;
  transition:background .25s,border-color .25s;
  box-shadow:var(--shadow);
}
.panel-title{
  font-size:11px;font-weight:800;color:var(--text-3);
  padding:12px 16px 4px;letter-spacing:.5px;text-transform:uppercase;
}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.stat-card{
  background:var(--surface);border-radius:var(--radius-lg);
  border:1px solid var(--border);padding:14px;
  display:flex;flex-direction:column;gap:4px;
  box-shadow:var(--shadow);
  transition:background .25s,border-color .25s;
}
.stat-card .s-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:6px;flex-shrink:0}
.stat-card .s-label{font-size:11px;color:var(--text-3);font-weight:700}
.stat-card .s-val{font-size:26px;font-weight:800;color:var(--text);font-family:var(--mono)}
.stat-card .s-sub{font-size:11px;color:var(--text-3);margin-top:2px}
.stat-card.accent{background:var(--accent);border-color:var(--accent)}
.stat-card.accent .s-label,.stat-card.accent .s-val,.stat-card.accent .s-sub{color:#fff}

/* ===== CLASS PILLS ===== */
.class-tabs{display:flex;gap:8px;margin-bottom:14px}
.class-tab{
  flex:1;padding:9px 8px;border-radius:10px;
  font-size:13px;font-weight:700;
  border:2px solid var(--border);
  background:var(--surface);color:var(--text-3);
  text-align:center;transition:all .15s;
}
.class-tab.act-1ere{background:var(--c1-bg);border-color:var(--c1);color:var(--c1)}
.class-tab.act-2eme{background:var(--c2-bg);border-color:var(--c2);color:var(--c2)}

/* ===== SUBJECT PILLS ===== */
.subj-row{
  display:flex;gap:6px;margin-bottom:12px;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;padding-bottom:2px;
}
.subj-row::-webkit-scrollbar{display:none}
.subj-pill{
  padding:7px 14px;border-radius:20px;
  font-size:12px;font-weight:700;white-space:nowrap;
  border:1.5px solid var(--border);
  background:var(--surface);color:var(--text-3);
  transition:all .15s;
}
.subj-pill.math{background:var(--math-bg);border-color:var(--math);color:var(--math)}
.subj-pill.phy{background:var(--phy-bg);border-color:var(--phy);color:var(--phy)}
.subj-pill.svt{background:var(--svt-bg);border-color:var(--svt);color:var(--svt)}

/* ===== CARD ITEMS ===== */
.card-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;border-bottom:1px solid var(--border);
  transition:background .1s;
}
.card-item:last-child{border-bottom:none}
.card-item:active{background:var(--surface-2)}
.card-item-icon{
  width:42px;height:42px;border-radius:12px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.card-item-body{flex:1;min-width:0}
.card-item-title{font-size:14px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-item-sub{font-size:12px;color:var(--text-3);margin-top:2px}
.card-item-actions{display:flex;gap:6px;align-items:center;flex-shrink:0}

/* ===== BUTTONS ===== */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:11px 18px;border-radius:10px;font-size:14px;font-weight:700;
  transition:opacity .15s,transform .1s;
}
.btn:active{opacity:.8;transform:scale(.97)}
.btn-accent{background:var(--accent);color:#fff}
.btn-outline{background:var(--surface);border:1.5px solid var(--border-2);color:var(--text-2)}
.btn-danger{background:var(--danger-light);color:var(--danger)}
.btn-green{background:var(--green-light);color:var(--green)}
.btn-full{width:100%}
.btn-sm{padding:7px 12px;font-size:13px;border-radius:8px}
.btn-icon{
  width:34px;height:34px;display:flex;align-items:center;justify-content:center;
  border-radius:9px;background:var(--surface-2);color:var(--text-3);
  transition:background .1s;flex-shrink:0;
}
.btn-icon.accent{background:var(--accent-light);color:var(--accent)}
.btn-icon.danger{background:var(--danger-light);color:var(--danger)}
.btn-icon.green{background:var(--green-light);color:var(--green)}

/* ===== BADGE ===== */
.badge{
  display:inline-flex;align-items:center;
  padding:3px 9px;border-radius:20px;
  font-size:11px;font-weight:700;white-space:nowrap;
}
.badge-green{background:var(--green-light);color:var(--green)}
.badge-amber{background:var(--amber-light);color:#A0711F}
.badge-red{background:var(--danger-light);color:var(--danger)}
.badge-gray{background:var(--surface-2);color:var(--text-3)}
.badge-blue{background:var(--accent-light);color:var(--accent)}
.badge-math{background:var(--math-bg);color:var(--math)}
.badge-phy{background:var(--phy-bg);color:var(--phy)}
.badge-svt{background:var(--svt-bg);color:var(--svt)}
.badge-c1{background:var(--c1-bg);color:var(--c1)}
.badge-c2{background:var(--c2-bg);color:var(--c2)}

/* ===== FORM FIELDS ===== */
.field-row{margin-bottom:12px}
.field-row label{display:block;font-size:12px;font-weight:700;color:var(--text-3);margin-bottom:5px;letter-spacing:.3px}
.field{
  width:100%;padding:11px 13px;
  border-radius:10px;border:1.5px solid var(--border);
  background:var(--surface-2);font-size:14px;color:var(--text);
  transition:border-color .15s,background .15s;
}
.field:focus{border-color:var(--accent);background:var(--surface)}
textarea.field{resize:vertical;min-height:80px;line-height:1.5}
select.field{-webkit-appearance:none;appearance:none}
.req{color:var(--danger)}
.field-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ===== TABS ===== */
.tabs-scroll{
  display:flex;gap:0;overflow-x:auto;
  border-bottom:2px solid var(--border);
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
  margin:0 -14px 14px;padding:0 14px;
}
.tabs-scroll::-webkit-scrollbar{display:none}
.tab-btn{
  padding:10px 16px;font-size:13px;font-weight:700;
  color:var(--text-3);border-bottom:2.5px solid transparent;
  white-space:nowrap;transition:color .15s;margin-bottom:-2px;
}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

/* ===== SECTION HEADER ===== */
.section-header{
  display:flex;align-items:center;gap:10px;
  padding:0 0 12px;
}
.section-header h2{font-size:16px;font-weight:800;flex:1}
.count-badge{
  background:var(--accent-light);color:var(--accent);
  border-radius:20px;padding:3px 11px;
  font-size:12px;font-weight:700;font-family:var(--mono);
}

/* ===== PROGRESS BAR ===== */
.progress-bar{height:7px;border-radius:6px;background:var(--bg);overflow:hidden}
.progress-fill{height:100%;border-radius:6px;background:var(--accent);transition:width .5s ease}

/* ===== QUICK MARK ===== */
.quick-mark-row{display:flex;gap:5px}
.qm-btn{
  flex:1;padding:8px 4px;border-radius:9px;font-size:12px;font-weight:700;
  border:1.5px solid var(--border);background:var(--surface);color:var(--text-2);
  transition:all .1s;
}
.qm-btn.present{background:var(--green-light);color:var(--green);border-color:#b2e8d7}
.qm-btn.absent{background:var(--danger-light);color:var(--danger);border-color:#f7c5c5}
.qm-btn.late{background:var(--amber-light);color:#A0711F;border-color:#f5d98a}

/* ===== DATA ROW ===== */
.data-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:11px 16px;border-bottom:1px solid var(--border);font-size:14px;
}
.data-row:last-child{border-bottom:none}
.data-row .key{color:var(--text-3);font-size:13px}
.data-row .val{font-weight:700;color:var(--text)}

/* ===== OVERLAY / SHEET ===== */
.overlay{
  position:fixed;inset:0;z-index:100;
  background:rgba(10,15,35,.55);
  display:none;align-items:flex-end;
  backdrop-filter:blur(3px);
}
.overlay.show{display:flex}
.sheet{
  background:var(--surface);width:100%;
  border-radius:var(--radius-xl) var(--radius-xl) 0 0;
  max-height:94vh;max-height:94dvh;
  overflow-y:auto;
  animation:sheetUp .28s cubic-bezier(.32,.72,0,1);
}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:none}}
.sheet-handle{display:flex;justify-content:center;padding:10px 0 6px}
.sheet-handle span{width:36px;height:4px;border-radius:3px;background:var(--border-2)}
.sheet-head{
  padding:4px 16px 14px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.sheet-head h3{font-size:16px;font-weight:800}
.sheet-body{padding:16px}
.sheet-foot{
  display:flex;gap:10px;
  padding:12px 16px calc(12px + env(safe-area-inset-bottom));
  border-top:1px solid var(--border);
  background:var(--surface);
}
.sheet-foot .btn{flex:1}

/* ===== TOAST ===== */
#toast-area{
  position:fixed;top:68px;right:0;left:0;
  display:flex;flex-direction:column;align-items:center;
  z-index:200;gap:6px;pointer-events:none;
  max-width:520px;margin:0 auto;
}
.toast{
  background:#1C2340;color:#fff;
  padding:10px 20px;border-radius:12px;
  font-size:13px;font-weight:600;
  box-shadow:var(--shadow-lg);
  max-width:90%;text-align:center;
  animation:toastIn .25s ease;
}
@keyframes toastIn{from{transform:translateY(-10px);opacity:0}to{transform:none;opacity:1}}
.toast.success{background:var(--green)}
.toast.error{background:var(--danger)}
.toast.info{background:var(--accent)}

/* ===== EMPTY STATE ===== */
.empty{
  text-align:center;padding:48px 16px;
  display:flex;flex-direction:column;align-items:center;gap:10px;
}
.empty svg{color:var(--border-2)}
.empty h4{font-size:15px;font-weight:700;color:var(--text-2)}
.empty p{font-size:13px;color:var(--text-3)}

/* ===== SESSION CARDS ===== */
.session-card{
  background:var(--surface);border-radius:var(--radius-lg);
  border:1px solid var(--border);margin-bottom:10px;
  overflow:hidden;box-shadow:var(--shadow);
}
.session-card-head{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;cursor:pointer;
}
.session-card-body{
  padding:0 14px 12px;border-top:1px solid var(--border);
  display:none;
}
.session-card.open .session-card-body{display:block;animation:fadeIn .18s ease}
.session-date-badge{
  padding:4px 10px;border-radius:8px;
  font-size:11px;font-weight:700;font-family:var(--mono);
  background:var(--surface-2);color:var(--text-3);
}

/* ===== LESSON CARD ===== */
.lesson-card{
  background:var(--surface);border-radius:var(--radius-lg);
  border:1px solid var(--border);margin-bottom:10px;
  overflow:hidden;box-shadow:var(--shadow);
}
.lesson-card-head{
  display:flex;align-items:center;gap:12px;
  padding:14px;cursor:pointer;
}
.lesson-card-body{
  padding:0 14px 14px;
  display:none;border-top:1px solid var(--border);
}
.lesson-card.open .lesson-card-body{display:block;animation:fadeIn .18s ease}
.lesson-section{margin-bottom:12px}
.lesson-section-title{
  font-size:11px;font-weight:800;color:var(--text-3);
  letter-spacing:.4px;text-transform:uppercase;margin-bottom:6px;
}
.lesson-content{
  font-size:13px;color:var(--text-2);line-height:1.7;
  padding:10px 12px;background:var(--surface-2);border-radius:8px;
}
.lesson-term-row{
  display:flex;gap:8px;align-items:flex-start;
  padding:6px 0;border-bottom:1px dashed var(--border);font-size:13px;
}
.lesson-term-row:last-child{border-bottom:none}
.lesson-term-key{font-weight:700;color:var(--accent);flex-shrink:0;min-width:100px}
.lesson-term-val{color:var(--text-2)}

/* ===== ATTENDANCE TABLE ===== */
.att-row{
  display:flex;align-items:center;gap:10px;
  padding:10px 0;border-bottom:1px solid var(--border);
}
.att-row:last-child{border-bottom:none}
.att-name{flex:1;font-size:14px;font-weight:600}

/* ===== GRADE CARD ===== */
.grade-item{
  display:flex;align-items:center;gap:12px;
  padding:11px 14px;border-bottom:1px solid var(--border);
}
.grade-item:last-child{border-bottom:none}
.grade-score{
  font-size:20px;font-weight:800;font-family:var(--mono);
  color:var(--accent);min-width:48px;text-align:center;
}
.grade-score.pass{color:var(--green)}
.grade-score.fail{color:var(--danger)}
.grade-score.avg{color:var(--amber)}

/* ===== EXERCISE CARD ===== */
.ex-card{
  background:var(--surface);border-radius:var(--radius-lg);
  border:1px solid var(--border);margin-bottom:10px;
  overflow:hidden;box-shadow:var(--shadow);
}
.ex-card-head{padding:14px;display:flex;align-items:flex-start;gap:10px}
.ex-num{
  width:32px;height:32px;border-radius:8px;
  background:var(--accent-light);color:var(--accent);
  font-size:13px;font-weight:800;font-family:var(--mono);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.ex-solution{
  padding:12px 14px;
  border-top:1px dashed var(--border);
  display:none;background:var(--surface-2);
}
.ex-solution.show{display:block;animation:fadeIn .2s ease}

/* ===== PAYMENT STATUS ===== */
.pay-month-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:6px;
  padding:12px;
}
.pay-month-card{
  border-radius:8px;border:1.5px solid var(--border);
  padding:8px 6px;text-align:center;cursor:pointer;
  transition:all .15s;font-size:11px;font-weight:700;
}
.pay-month-card.paid{background:var(--green-light);border-color:var(--green);color:var(--green)}
.pay-month-card.unpaid{background:var(--danger-light);border-color:var(--danger);color:var(--danger)}
.pay-month-card.partial{background:var(--amber-light);border-color:var(--amber);color:#A0711F}
.pay-month-card.late{background:var(--purple-light);border-color:var(--purple);color:var(--purple)}
.pay-month-card.none{background:var(--surface-2);border-color:var(--border);color:var(--text-3)}

/* ===== SEARCH ===== */
.search-bar{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;background:var(--surface);
  border:1.5px solid var(--border);border-radius:12px;
  margin-bottom:14px;
}
.search-bar input{flex:1;font-size:14px;color:var(--text)}
.search-bar svg{color:var(--text-3);flex-shrink:0}
.search-result-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;border-bottom:1px solid var(--border);
  cursor:pointer;transition:background .1s;
}
.search-result-item:active{background:var(--surface-2)}
.search-result-type{
  font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;
  background:var(--accent-light);color:var(--accent);
}

/* ===== ADMIN MODE ===== */
.admin-actions{
  display:none;gap:6px;
}
body.admin-mode .admin-actions{display:flex}
.admin-actions .btn-icon{background:var(--amber-light);color:var(--amber)}

/* ===== SETTINGS ===== */
.setting-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;border-bottom:1px solid var(--border);
}
.setting-row:last-child{border-bottom:none}
.setting-label{font-size:14px;font-weight:600;color:var(--text)}
.setting-sub{font-size:12px;color:var(--text-3);margin-top:2px}
/* Toggle */
.toggle{
  position:relative;width:46px;height:26px;
  background:var(--border-2);border-radius:13px;
  transition:background .2s;cursor:pointer;flex-shrink:0;
}
.toggle.on{background:var(--accent)}
.toggle::after{
  content:'';position:absolute;top:3px;right:3px;
  width:20px;height:20px;border-radius:50%;
  background:#fff;transition:right .2s;
  box-shadow:0 1px 4px rgba(0,0,0,.2);
}
.toggle.on::after{right:calc(100% - 23px)}
/* Color Picker */
.color-options{display:flex;gap:8px;flex-wrap:wrap;padding:4px 0}
.color-opt{
  width:32px;height:32px;border-radius:50%;cursor:pointer;
  border:3px solid transparent;transition:border-color .15s,transform .1s;
}
.color-opt.selected{border-color:var(--text);transform:scale(1.15)}

/* ===== GLOSSARY ===== */
.term-card{
  background:var(--surface);border-radius:var(--radius-lg);
  border:1px solid var(--border);margin-bottom:8px;
  padding:14px;box-shadow:var(--shadow);
}
.term-word{font-size:15px;font-weight:800;color:var(--accent);margin-bottom:4px}
.term-def{font-size:13px;color:var(--text-2);line-height:1.6}
.term-tags{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}

/* ===== PLANNING / TIMELINE ===== */
.timeline-item{
  display:flex;gap:12px;padding:0 0 16px 0;position:relative;
}
.timeline-item:not(:last-child)::before{
  content:'';position:absolute;right:18px;top:36px;
  width:2px;bottom:0;background:var(--border);
}
.timeline-dot{
  width:36px;height:36px;border-radius:50%;
  border:3px solid var(--border);background:var(--surface);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;z-index:1;
}
.timeline-dot.done{background:var(--green);border-color:var(--green);color:#fff}
.timeline-dot.active{background:var(--accent);border-color:var(--accent);color:#fff}
.timeline-body{flex:1;background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);padding:12px}

/* ===== CHART ===== */
canvas{display:block;max-width:100%}
.chart-wrap{padding:8px 14px 14px}

/* ===== DIVIDER ===== */
.divider{height:1px;background:var(--border);margin:8px 0}

/* ===== PRINT ===== */
#print-area{display:none}
@media print{
  body>*:not(#print-area){display:none!important}
  #print-area{display:block!important}
}

/* ===== RESPONSIVE ===== */
@media(min-width:520px){
  .stat-grid{grid-template-columns:repeat(4,1fr)}
}
</style>

<script>
/* =================================================================
   CONSTANTS
================================================================= */
const SK = 'tutorV4';
const CLASSES = [
  { id:'1ere', label:'1ère Collège', color:'var(--c1)', bg:'var(--c1-bg)', short:'1ère' },
  { id:'2eme', label:'2ème Collège', color:'var(--c2)', bg:'var(--c2-bg)', short:'2ème' }
];
const SUBJECTS = [
  { id:'math', label:'Mathématiques', short:'Maths',   color:'var(--math)', bg:'var(--math-bg)', cls:'math' },
  { id:'phy',  label:'Physique-Chimie', short:'Physique', color:'var(--phy)',  bg:'var(--phy-bg)',  cls:'phy'  },
  { id:'svt',  label:'SVT',            short:'SVT',    color:'var(--svt)',  bg:'var(--svt-bg)',  cls:'svt'  }
];
const GRADE_TYPES = ['فرض محروس','اختبار','مشاركة','ملاحظة','فرض منزلي'];
const ATT_STATUS  = { present:'حاضر', absent:'غائب', late:'متأخر' };
const PAY_STATUS  = { paid:'مدفوع', unpaid:'غير مدفوع', partial:'جزئي', late:'متأخر', none:'—' };
const PAY_STATUS_CLS = { paid:'paid', unpaid:'unpaid', partial:'partial', late:'late', none:'none' };
const MONTHS_AR = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليوز','غشت','شتنبر','أكتوبر','نونبر','دجنبر'];
const LEVEL_COLORS = {
  'سهل':'badge-green','متوسط':'badge-amber','صعب':'badge-red','تحدٍّ':'badge-blue'
};
const ACCENT_COLORS = [
  {name:'أزرق داكن',val:'#3B4FC0'},
  {name:'أخضر',val:'#178A6F'},
  {name:'بنفسجي',val:'#7C3AED'},
  {name:'برتقالي',val:'#D05A20'},
  {name:'وردي',val:'#C0396A'},
  {name:'سماوي',val:'#0891B2'},
];

function subjById(id){ return SUBJECTS.find(s=>s.id===id)||SUBJECTS[0] }
function clsById(id){  return CLASSES.find(c=>c.id===id)||CLASSES[0]  }

/* =================================================================
   DATA
================================================================= */
function defaultData(){
  return {
    students:[],
    sessions:[],
    attendance:[],
    grades:[],
    payments:[],      // monthly subscription payments
    lessons:[],
    exercises:[],
    homework:[],
    glossary:[],
    settings:{
      defaultFee:200,
      darkMode:false,
      accentColor:'#3B4FC0',
      adminMode:false
    }
  };
}
let DATA = (function(){
  try{
    const r=localStorage.getItem(SK);
    if(r){
      const p=JSON.parse(r);
      const merged={...defaultData(),...p};
      merged.settings={...defaultData().settings,...(p.settings||{})};
      return merged;
    }
    // Migrate from old key
    const old=localStorage.getItem('tutorV3');
    if(old){
      const p=JSON.parse(old);
      const d=defaultData();
      return {...d,...p,settings:{...d.settings,...(p.settings||{})}};
    }
    return defaultData();
  }catch(e){return defaultData();}
})();

function save(){ localStorage.setItem(SK,JSON.stringify(DATA)); updateBadges(); }
function uid(){ return '_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function esc(s){ if(s==null)return''; return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]); }
function today(){ return new Date().toISOString().slice(0,10); }
function currentYM(){ return new Date().toISOString().slice(0,7); }
function fdate(d){ if(!d)return'—'; const p=d.split('-'); return `${p[2]}/${p[1]}/${p[0]}`; }
function monthLabel(ym){ if(!ym)return'—'; const [y,m]=ym.split('-'); return (MONTHS_AR[+m-1]||ym)+' '+y; }
function getYearMonths(){ 
  const months=[];
  const now=new Date();
  const yr=now.getFullYear();
  // Academic year Sep → Jun
  const start=now.getMonth()<8?yr-1:yr;
  for(let m=8;m<12;m++) months.push(`${start}-${String(m+1).padStart(2,'0')}`);
  for(let m=0;m<6;m++) months.push(`${start+1}-${String(m+1).padStart(2,'0')}`);
  return months;
}

/* =================================================================
   APPLY SETTINGS
================================================================= */
function applySettings(){
  document.body.classList.toggle('dark',!!DATA.settings.darkMode);
  document.body.classList.toggle('admin-mode',!!DATA.settings.adminMode);
  const r=document.documentElement;
  const c=DATA.settings.accentColor||'#3B4FC0';
  r.style.setProperty('--accent',c);
  r.style.setProperty('--accent-dark',shadeColor(c,-15));
  r.style.setProperty('--accent-light',hexToLight(c));
}
function shadeColor(hex,pct){
  const n=parseInt(hex.slice(1),16);
  const r=Math.min(255,Math.max(0,(n>>16)+(pct*2.55|0)));
  const g=Math.min(255,Math.max(0,((n>>8)&0xff)+(pct*2.55|0)));
  const b=Math.min(255,Math.max(0,(n&0xff)+(pct*2.55|0)));
  return `#${(r<<16|g<<8|b).toString(16).padStart(6,'0')}`;
}
function hexToLight(hex){
  const n=parseInt(hex.slice(1),16);
  const r=(n>>16);const g=(n>>8)&0xff;const b=n&0xff;
  if(document.body.classList.contains('dark'))
    return `rgba(${r},${g},${b},0.18)`;
  return `rgba(${r},${g},${b},0.12)`;
}

/* =================================================================
   TOAST
================================================================= */
function toast(msg,type=''){
  const el=document.createElement('div');
  el.className='toast'+(type?' '+type:'');
  el.textContent=msg;
  document.getElementById('toast-area').appendChild(el);
  setTimeout(()=>{
    el.style.transition='opacity .3s,transform .3s';
    el.style.opacity='0';el.style.transform='translateY(-8px)';
    setTimeout(()=>el.remove(),300);
  },2600);
}

/* =================================================================
   SHEET (MODAL)
================================================================= */
function showSheet(title,bodyHtml,actions=[]){
  const actHtml=actions.map(a=>`<button class="btn ${a.cls||'btn-outline'}" onclick="${a.fn}">${a.label}</button>`).join('');
  document.getElementById('sheet').innerHTML=`
    <div class="sheet-handle"><span></span></div>
    <div class="sheet-head">
      <h3>${title}</h3>
      <button class="btn-icon" onclick="closeSheet()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="sheet-body">${bodyHtml}</div>
    ${actHtml?`<div class="sheet-foot">${actHtml}</div>`:''}
  `;
  document.getElementById('overlay').classList.add('show');
}
function closeSheet(){
  document.getElementById('overlay').classList.remove('show');
}
function overlayClick(e){
  if(e.target===document.getElementById('overlay')) closeSheet();
}

/* =================================================================
   DRAWER
================================================================= */
function openDrawer(){
  renderDrawer();
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('show');
  document.body.style.overflow='hidden';
}
function closeDrawer(){
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('show');
  document.body.style.overflow='';
}
function renderDrawer(){
  const items=[
    {key:'dashboard',    icon:IC.home,   color:'var(--accent)',  bg:'var(--accent-light)',label:'الرئيسية'},
    {key:'students',     icon:IC.user,   color:'var(--c1)',      bg:'var(--c1-bg)',       label:'التلاميذ',        count:DATA.students.length},
    {key:'lessons',      icon:IC.book,   color:'var(--math)',    bg:'var(--math-bg)',     label:'الدروس',          count:DATA.lessons.length},
    {key:'exercises',    icon:IC.pen,    color:'var(--phy)',     bg:'var(--phy-bg)',      label:'التمارين',        count:DATA.exercises.length},
    {key:'homework',     icon:IC.clip,   color:'var(--danger)',  bg:'var(--danger-light)',label:'الفروض',          count:DATA.homework.length},
    {key:'glossary',     icon:IC.book2,  color:'var(--purple)',  bg:'var(--purple-light)',label:'المصطلحات',       count:DATA.glossary.length},
    {key:'sessions',     icon:IC.clock,  color:'var(--accent)',  bg:'var(--accent-light)',label:'التخطيط الزمني',  count:DATA.sessions.length},
    {key:'attendance',   icon:IC.check,  color:'var(--green)',   bg:'var(--green-light)', label:'الحضور والغياب'},
    {key:'grades',       icon:IC.star,   color:'var(--amber)',   bg:'var(--amber-light)', label:'الأداء والنقاط'},
    {key:'payments',     icon:IC.money,  color:'var(--green)',   bg:'var(--green-light)', label:'الدفع الشهري'},
    {key:'reports',      icon:IC.chart,  color:'var(--purple)',  bg:'var(--purple-light)',label:'التقارير'},
    {key:'settings',     icon:IC.gear,   color:'var(--text-3)',  bg:'var(--surface-2)',   label:'الإعدادات'},
    {key:'data',         icon:IC.db,     color:'var(--text-3)',  bg:'var(--surface-2)',   label:'النسخ الاحتياطي'},
  ];
  document.getElementById('drawer-content').innerHTML=`
    <div class="drawer-section">

const MAIN_NAVS=['dashboard','students','attendance','grades','settings'];
const NO_FAB=['settings','data','reports','search'];

function _nav(key,extra){
  document.querySelectorAll('.section').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(btn=>{
    const k=MAIN_NAVS.includes(key)?key:'';
    btn.classList.toggle('active',btn.dataset.nav===k);
  });
  const fab=document.getElementById('main-fab');
  fab.style.display=NO_FAB.includes(key)?'none':'flex';
  const tl=document.getElementById('topbar-left');
  const tr=document.getElementById('topbar-right');
  currentSection=key;
  document.getElementById('topbar-title').textContent=SECTION_TITLES[key]||key;
  const sec=document.getElementById('sec-'+key);
  if(sec){ sec.classList.add('active'); document.getElementById('page-content').scrollTop=0; }
  // Render
  const renderers={
    dashboard:renderDashboard,
    students:renderStudents,
    attendance:renderAttendance,
    grades:renderGrades,
    sessions:renderSessions,
    lessons:renderLessons,
    exercises:renderExercises,
    homework:renderHomework,
    payments:renderPayments,
    glossary:renderGlossary,
    reports:renderReports,
    settings:renderSettings,
    data:renderData,
    search:renderSearch,
  };
  if(key==='student-detail') renderStudentDetail(extra);
  else if(renderers[key]) renderers[key]();
}
function navigate(key,extra,noHistory){
  if(!noHistory) navHistory.push(key+(extra?'|'+extra:''));
  _nav(key,extra);
  localStorage.setItem('lastNav',key+'|'+(extra||''));
}
function goBack(){
  navHistory.pop();
  const prev=navHistory[navHistory.length-1]||'dashboard';
  const [k,e]=prev.split('|');
  _nav(k,e);
}
function updateBadges(){
  const nd=document.getElementById('nd-students');
  if(nd){
    const n=DATA.students.length;
    nd.textContent=n;
    nd.classList.toggle('show',n>0);
  }
}

function openStudentForm(id){
  const s=id?DATA.students.find(x=>x.id===id):{};
  const clsOpts=CLASSES.map(c=>`<option value="${c.id}" ${(s.cls||filStud.cls)===c.id?'selected':''}>${c.label}</option>`).join('');
  const statusOpts=['نشط','متوقف','منسحب'].map(v=>`<option value="${v}" ${(s.status||'نشط')===v?'selected':''}>${v}</option>`).join('');
  showSheet(id?'تعديل بيانات التلميذ':'تسجيل تلميذ جديد',`
    <div class="field-row"><label>الاسم الكامل <span class="req">*</span></label>
      <input class="field" id="sf-name" placeholder="اسم ولقب التلميذ" value="${esc(s.name||'')}"></div>
    <div class="field-grid-2">
      <div class="field-row"><label>القسم <span class="req">*</span></label>
        <select class="field" id="sf-cls">${clsOpts}</select></div>
      <div class="field-row"><label>الحالة</label>
        <select class="field" id="sf-status">${statusOpts}</select></div>
    </div>
    <div class="field-row"><label>رقم ولي الأمر</label>
      <input class="field" id="sf-phone" type="tel" placeholder="0600000000" value="${esc(s.phone||'')}"></div>
    <div class="field-grid-2">
      <div class="field-row"><label>تاريخ التسجيل</label>
        <input class="field" type="date" id="sf-regdate" value="${s.regDate||today()}"></div>
      <div class="field-row"><label>الأجر الشهري (د.م)</label>
        <input class="field" type="number" id="sf-fee" value="${s.fee||DATA.settings.defaultFee||200}"></div>
    </div>
    <div class="field-row"><label>ملاحظات</label>
      <textarea class="field" id="sf-notes">${esc(s.notes||'')}</textarea></div>
    <input type="hidden" id="sf-id" value="${id||''}">
  `,[
    {label:'إلغاء',cls:'btn-outline',fn:'closeSheet()'},
    {label:'حفظ',cls:'btn-accent',fn:'saveStudent()'}
  ]);
}
function saveStudent(){
  const id=document.getElementById('sf-id').value;
  const name=document.getElementById('sf-name').value.trim();
  const cls=document.getElementById('sf-cls').value;
  if(!name){toast('أدخل اسم التلميذ','error');return;}
  const obj={name,cls,
    status:document.getElementById('sf-status').value,
    phone:document.getElementById('sf-phone').value.trim(),
    regDate:document.getElementById('sf-regdate').value,
    fee:+document.getElementById('sf-fee').value||DATA.settings.defaultFee,
    notes:document.getElementById('sf-notes').value.trim()
  };
  if(id){ Object.assign(DATA.students.find(x=>x.id===id),obj); }
  else { DATA.students.push({id:uid(),...obj}); }
  save();closeSheet();toast('تم الحفظ','success');renderStudents();
}
function deleteStudent(id){
  if(!confirm('سيتم حذف التلميذ وجميع بياناته (الحضور، النقاط، الأداءات). هل تؤكد؟'))return;
  DATA.students=DATA.students.filter(s=>s.id!==id);
  DATA.attendance=DATA.attendance.filter(a=>a.sid!==id);
  DATA.grades=DATA.grades.filter(g=>g.sid!==id);
  DATA.payments=DATA.payments.filter(p=>p.sid!==id);
  save();toast('تم الحذف');renderStudents();
}

let notesSaveTimer=null;
function autoSaveNotes(id){
  clearTimeout(notesSaveTimer);

function openMonthPayment(sid,ym){
  const s=DATA.students.find(x=>x.id===sid);
  const fee=s?s.fee||DATA.settings.defaultFee:DATA.settings.defaultFee;
  const pays=DATA.payments.filter(p=>p.sid===sid);
  const existing=pays.find(p=>p.month===ym)||{};
  const statusOpts=['none','paid','partial','late','unpaid'].map(v=>
    `<option value="${v}" ${(existing.status||'none')===v?'selected':''}>${PAY_STATUS[v]}</option>`).join('');
  showSheet(`أداء ${monthLabel(ym)}`,`
    <div class="field-row"><label>الحالة</label>
      <select class="field" id="mp-status">${statusOpts}</select></div>
    <div class="field-grid-2">
      <div class="field-row"><label>المبلغ المدفوع (د.م)</label>
        <input class="field" type="number" id="mp-paid" value="${existing.paid||fee}"></div>
      <div class="field-row"><label>تاريخ الدفع</label>
        <input class="field" type="date" id="mp-date" value="${existing.date||today()}"></div>
    </div>
    <div class="field-row"><label>ملاحظة</label>
      <input class="field" id="mp-note" value="${esc(existing.note||'')}"></div>
    <input type="hidden" id="mp-sid" value="${sid}">
    <input type="hidden" id="mp-month" value="${ym}">
    <input type="hidden" id="mp-id" value="${existing.id||''}">
  `,[
    {label:'إلغاء',cls:'btn-outline',fn:'closeSheet()'},
    {label:'حفظ',cls:'btn-accent',fn:'saveMonthPayment()'}
  ]);
}
function saveMonthPayment(){
  const sid=document.getElementById('mp-sid').value;
  const month=document.getElementById('mp-month').value;
  const existId=document.getElementById('mp-id').value;
  const obj={
    sid,month,
    status:document.getElementById('mp-status').value,
    paid:+document.getElementById('mp-paid').value,
    date:document.getElementById('mp-date').value,
    note:document.getElementById('mp-note').value.trim()
  };
  if(existId){
    const idx=DATA.payments.findIndex(p=>p.id===existId);
    if(idx>=0) DATA.payments[idx]={...DATA.payments[idx],...obj};
    else DATA.payments.push({id:uid(),...obj});
  } else {
    const existing=DATA.payments.find(p=>p.sid===sid&&p.month===month);
    if(existing) Object.assign(existing,obj);
    else DATA.payments.push({id:uid(),...obj});
  }
  save();closeSheet();toast('تم الحفظ','success');
  renderStudentDetail(sid);
}

            <div class="s-val" style="color:var(--green)">${nP}</div>

            <div class="s-label">متأخر</div>
          </div>
        </div>
        <div class="panel" style="padding:0 14px">
          ${stds.map(s=>{
            const st=getStatus(s.id);
            return `<div class="att-row">
              <div class="att-name">${esc(s.name)}</div>

                <button class="qm-btn ${st==='late'?'late':''}"    onclick="quickMark('${s.id}','late','${cls}','${date}')">تأخر</button>
              </div>
            </div>`;
          }).join('')}
        </div>`}
    <div class="panel" style="margin-top:12px">
      <div class="panel-title">آخر السجلات</div>
      ${DATA.attendance.filter(a=>a.cls===cls).slice(-20).reverse().map(a=>{
        const st=DATA.students.find(s=>s.id===a.sid);
        const sc=a.status==='present'?'badge-green':a.status==='absent'?'badge-red':'badge-amber';
        return `<div class="data-row">
          <span class="key">${fdate(a.date)} · ${esc(st?.name||'—')}</span>

}
function setAttCls(cls){ filAtt.cls=cls; renderAttendance(); }
function setAttDate(d){ filAtt.date=d; renderAttendance(); }
function quickMark(sid,status,cls,date){
  const idx=DATA.attendance.findIndex(a=>a.sid===sid&&a.date===date&&a.cls===cls);
  if(idx>=0){
    if(DATA.attendance[idx].status===status) DATA.attendance.splice(idx,1);
    else DATA.attendance[idx].status=status;
  } else {
    DATA.attendance.push({id:uid(),sid,cls,date,status});
  }
  save();renderAttendance();
}

}

let searchQ='';
function renderSearch(){
  const sec=document.getElementById('sec-search');
  sec.innerHTML=`
    <div class="search-bar">
      ${IC.search}
      <input id="global-search" placeholder="ابحث في التلاميذ، الدروس، التمارين..." autofocus
        oninput="doSearch(this.value)" value="${esc(searchQ)}">
      ${searchQ?`<button onclick="doSearch('')" style="color:var(--text-3)">✕</button>`:''}
    </div>
    <div id="search-results">${searchQ?buildSearchResults(searchQ):`<div class="empty"><h4>ابدأ الكتابة للبحث</h4><p>يبحث في التلاميذ، الدروس، التمارين، الفروض، المصطلحات</p></div>`}</div>
  `;
  setTimeout(()=>document.getElementById('global-search')?.focus(),100);
}
function doSearch(q){
  searchQ=q;
  const res=document.getElementById('search-results');
  if(!res)return;
  if(!q){res.innerHTML=`<div class="empty"><h4>ابدأ الكتابة للبحث</h4><p>يبحث في جميع محتويات التطبيق</p></div>`;return;}
  res.innerHTML=buildSearchResults(q);
}
function buildSearchResults(q){
  if(!q)return'';
  const ql=q.toLowerCase();
  const results=[];
  DATA.students.forEach(s=>{
    if(s.name.toLowerCase().includes(ql)||(s.phone||'').includes(ql))
      results.push({type:'تلميذ',title:s.name,sub:s.phone||clsById(s.cls).label,nav:`navigate('student-detail','${s.id}')`});
  });
  DATA.lessons.forEach(l=>{
    if(l.title.toLowerCase().includes(ql)||(l.summary||'').toLowerCase().includes(ql)||(l.content||'').toLowerCase().includes(ql))
      results.push({type:'درس',title:l.title,sub:subjById(l.subj).label,nav:`navigate('lessons')`});
  });
  DATA.exercises.forEach(e=>{
    if(e.title.toLowerCase().includes(ql)||(e.content||'').toLowerCase().includes(ql))
      results.push({type:'تمرين',title:e.title,sub:subjById(e.subj).label+' · '+(e.level||''),nav:`navigate('exercises')`});
  });
  DATA.homework.forEach(h=>{
    if(h.title.toLowerCase().includes(ql)||(h.content||'').toLowerCase().includes(ql))
      results.push({type:'فرض',title:h.title,sub:fdate(h.dueDate||''),nav:`navigate('homework')`});
  });
  DATA.glossary.forEach(t=>{
    if(t.word.toLowerCase().includes(ql)||(t.definition||'').toLowerCase().includes(ql))
      results.push({type:'مصطلح',title:t.word,sub:t.definition?t.definition.slice(0,50):'',nav:`navigate('glossary')`});
  });
  DATA.sessions.forEach(x=>{
    if(x.title.toLowerCase().includes(ql)||(x.lesson||'').toLowerCase().includes(ql))
      results.push({type:'حصة',title:x.title,sub:fdate(x.date),nav:`navigate('sessions')`});
  });
  if(results.length===0)

    <div class="panel">

}

function exportData(){
  const blob=new Blob([JSON.stringify(DATA,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`tutor-backup-${today()}.json`;
  a.click();
  toast('تم التصدير بنجاح','success');
}
document.getElementById('import-input').addEventListener('change',function(){
  const f=this.files[0];if(!f)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const parsed=JSON.parse(e.target.result);
      if(!parsed.students)throw new Error('ملف غير صالح');
      DATA={...defaultData(),...parsed,settings:{...defaultData().settings,...(parsed.settings||{})}};
      save();applySettings();toast('تم الاستيراد بنجاح','success');navigate('dashboard');
    }catch(err){toast('خطأ في الملف: '+err.message,'error');}
  };
  reader.readAsText(f);
  this.value='';
});
function resetData(){
  if(!confirm('هذا سيحذف جميع البيانات نهائياً. هل أنت متأكد؟'))return;
  if(!confirm('تأكيد ثانٍ: سيتم حذف كل البيانات بشكل دائم؟'))return;
  const settings=DATA.settings;
  DATA=defaultData();

}

/* =================================================================
   CHARTS (Canvas only — no external libs)
================================================================= */
function drawDashChart(){
  const canvas=document.getElementById('dash-chart');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const W=canvas.offsetWidth;canvas.width=W;canvas.height=160;
  const isDark=document.body.classList.contains('dark');
  const gridColor=isDark?'rgba(255,255,255,.08)':'rgba(0,0,0,.06)';
  const textColor=isDark?'#5A6490':'#8892B0';
  ctx.clearRect(0,0,W,160);

  // Two sections: attendance (%) left, grades (/20) right
  // Section 1: Attendance by class (0–100%)
  const attBars=CLASSES.map(c=>{
    const total=DATA.attendance.filter(a=>a.cls===c.id).length;
    const present=DATA.attendance.filter(a=>a.cls===c.id&&a.status==='present').length;
    return {label:c.short,val:total>0?Math.round(present/total*100):0,color:c.id==='1ere'?'#3B82F6':'#E55B20',unit:'%',max:100};
  });
  // Section 2: Grade averages by subject (0–20)
  const gradeBars=SUBJECTS.map(s=>{
    const gs=DATA.grades.filter(g=>g.subj===s.id&&g.max>0);
    const avg=gs.length>0?gs.reduce((a,g)=>a+g.score/g.max,0)/gs.length*20:0;
    return {label:s.short,val:+avg.toFixed(1),color:s.id==='math'?'#3B4FC0':s.id==='phy'?'#E09B2F':'#178A6F',unit:'/20',max:20};
  });

  const allBars=[...attBars,...gradeBars];
  const barW=Math.max(18,Math.floor((W-50)/allBars.length)-8);
  const chartH=115;const topPad=16;const leftPad=38;

  // Grid for attendance side (left, 0-100%)
  [0,50,100].forEach(v=>{
    const y=topPad+chartH*(1-v/100);
    ctx.strokeStyle=gridColor;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(leftPad,y);ctx.lineTo(W-10,y);ctx.stroke();
    ctx.fillStyle=textColor;ctx.font='9px sans-serif';ctx.textAlign='right';
    ctx.fillText(v+'%',leftPad-3,y+3);
  });

  // Divider between sections
  const divX=leftPad+(attBars.length*(barW+8));
  ctx.strokeStyle=gridColor;ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
  ctx.beginPath();ctx.moveTo(divX,topPad);ctx.lineTo(divX,topPad+chartH);ctx.stroke();
  ctx.setLineDash([]);

  // Grade axis labels (right side)
  [0,10,20].forEach(v=>{
    const y=topPad+chartH*(1-v/20);
    ctx.fillStyle=textColor;ctx.font='9px sans-serif';ctx.textAlign='left';
    ctx.fillText(v,W-18,y+3);
  });

  // Draw bars
  allBars.forEach((b,i)=>{
    const pct=b.val/b.max;
    const x=leftPad+i*(barW+8);
    const h=Math.max(2,chartH*pct);
    const y=topPad+chartH-h;
    ctx.fillStyle=b.color+'CC';
    roundRect(ctx,x,y,barW,h,4);ctx.fill();
    // Label below
    ctx.fillStyle=textColor;ctx.font='9px sans-serif';ctx.textAlign='center';
    ctx.fillText(b.label,x+barW/2,155);
    // Value above bar
    ctx.fillStyle=b.color;ctx.font='bold 9px sans-serif';
    const valTxt=b.unit==='%'?b.val+'%':b.val.toString();
    ctx.fillText(valTxt,x+barW/2,Math.max(y-3,topPad+2));
  });

  // Section labels
  ctx.fillStyle=textColor;ctx.font='bold 9px sans-serif';ctx.textAlign='center';
  ctx.fillText('الحضور',leftPad+attBars.length*(barW+8)/2-4,11);
  ctx.fillText('المعدلات',divX+(gradeBars.length*(barW+8))/2-4,11);
}
function drawStudentGradeChart(sid,grades){
  const canvas=document.getElementById('grade-chart-'+sid);
  if(!canvas||grades.length===0)return;
  const W=canvas.offsetWidth;canvas.width=W;canvas.height=140;
  const ctx=canvas.getContext('2d');
  const isDark=document.body.classList.contains('dark');
  const textColor=isDark?'#5A6490':'#8892B0';
  const accentColor=getComputedStyle(document.documentElement).getPropertyValue('--accent').trim()||'#3B4FC0';
  const sorted=grades.filter(g=>g.max>0).slice().sort((a,b)=>a.date>b.date?1:-1).slice(-8);
  if(sorted.length===0)return;
  const maxV=20;const points=sorted.map(g=>({y:g.score/g.max*20,label:g.title.slice(0,8)}));
  const W2=W-40;const H=110;const top=16;const left=36;
  ctx.clearRect(0,0,W,140);
  // Grid
  [0,5,10,15,20].forEach(v=>{
    const y=top+H*(1-v/maxV);
    ctx.strokeStyle=isDark?'rgba(255,255,255,.06)':'rgba(0,0,0,.05)';
    ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(left,y);ctx.lineTo(W-8,y);ctx.stroke();
    ctx.fillStyle=textColor;ctx.font='9px sans-serif';ctx.textAlign='right';
    ctx.fillText(v,left-3,y+3);
  });
  // Line
  const step=points.length>1?W2/(points.length-1):W2;
  ctx.strokeStyle=accentColor;ctx.lineWidth=2;ctx.lineJoin='round';
  ctx.beginPath();
  points.forEach((p,i)=>{
    const x=left+i*step;const y=top+H*(1-p.y/maxV);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.stroke();
  // Points
  points.forEach((p,i)=>{
    const x=left+i*step;const y=top+H*(1-p.y/maxV);
    ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);
    ctx.fillStyle=p.y>=10?'#178A6F':p.y>=7?'#E09B2F':'#D04040';
    ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle=textColor;ctx.font='8px sans-serif';ctx.textAlign='center';
    ctx.fillText(p.label,x,140-2);
    ctx.fillStyle=p.y>=10?'#178A6F':p.y>=7?'#E09B2F':'#D04040';
    ctx.fillText(p.y.toFixed(1),x,y-8);
  });
}
function drawGradeBarChart(grades,stds,subj){
  const canvas=document.getElementById('grade-bar-chart');
  if(!canvas||grades.length===0||stds.length===0)return;
  const W=canvas.offsetWidth;canvas.width=W;canvas.height=150;
  const ctx=canvas.getContext('2d');
  const isDark=document.body.classList.contains('dark');
  const textColor=isDark?'#5A6490':'#8892B0';
  const s=subjById(subj);
  const data=stds.map(st=>{
    const gs=grades.filter(g=>g.sid===st.id&&g.max>0);
    const avg=gs.length>0?gs.reduce((a,g)=>a+g.score/g.max,0)/gs.length*20:null;
    return {name:st.name.split(' ')[0],avg};
  }).filter(d=>d.avg!=null).slice(0,8);
  if(data.length===0)return;
  const barW=Math.floor((W-50)/data.length)-6;
  const chartH=110;const top=10;const left=40;
  ctx.clearRect(0,0,W,150);
  [0,5,10,15,20].forEach(v=>{
    const y=top+chartH*(1-v/20);
    ctx.strokeStyle=isDark?'rgba(255,255,255,.06)':'rgba(0,0,0,.05)';
    ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(left,y);ctx.lineTo(W-4,y);ctx.stroke();
    ctx.fillStyle=textColor;ctx.font='9px sans-serif';ctx.textAlign='right';
    ctx.fillText(v,left-3,y+3);
  });
  data.forEach((d,i)=>{
    const x=left+i*(barW+6);
    const h=chartH*(d.avg/20);
    const y=top+chartH-h;
    const col=d.avg>=14?'#178A6F':d.avg>=10?getComputedStyle(document.documentElement).getPropertyValue('--accent').trim()||s.color:d.avg>=7?'#E09B2F':'#D04040';
    ctx.fillStyle=col+'CC';
    roundRect(ctx,x,y,barW,h,4);ctx.fill();
    ctx.fillStyle=textColor;ctx.font='9px sans-serif';ctx.textAlign='center';
    ctx.fillText(d.name.slice(0,6),x+barW/2,148);
    ctx.fillStyle=col;ctx.font='bold 10px sans-serif';
    ctx.fillText(d.avg.toFixed(1),x+barW/2,y-4);
  });
}
function drawReportsChart(){
  const canvas=document.getElementById('reports-chart');
  if(!canvas)return;
  const W=canvas.offsetWidth;canvas.width=W;canvas.height=180;
  const ctx=canvas.getContext('2d');
  const isDark=document.body.classList.contains('dark');
  const textColor=isDark?'#5A6490':'#8892B0';
  // Donut chart: students by class
  const cx=W/2,cy=90,R=60,r=35;
  const total=DATA.students.length;
  if(total===0){
    ctx.fillStyle=textColor;ctx.font='13px sans-serif';ctx.textAlign='center';
    ctx.fillText('لا يوجد تلاميذ',cx,cy);return;
  }
  let startAngle=-Math.PI/2;
  CLASSES.forEach((c,i)=>{
    const n=studentsOf(c.id).length;
    const angle=n/total*Math.PI*2;
    const col=c.id==='1ere'?'#3B82F6':'#E55B20';
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,R,startAngle,startAngle+angle);
    ctx.closePath();
    ctx.fillStyle=col;ctx.fill();
    startAngle+=angle;
  });
  // Inner circle (donut hole)
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fillStyle=isDark?'#131729':'#F0F2F8';ctx.fill();
  // Center text
  ctx.fillStyle=isDark?'#E8EAF6':'#1C2340';
  ctx.font='bold 18px sans-serif';ctx.textAlign='center';
  ctx.fillText(total,cx,cy+6);
  ctx.fillStyle=textColor;ctx.font='11px sans-serif';
  ctx.fillText('تلميذ',cx,cy+20);
  // Legend
  let lx=10;
  CLASSES.forEach((c,i)=>{
    const n=studentsOf(c.id).length;
    const col=c.id==='1ere'?'#3B82F6':'#E55B20';
    const ly=160+i*16;
    ctx.fillStyle=col;ctx.fillRect(10,ly-8,10,10);
    ctx.fillStyle=textColor;ctx.font='11px sans-serif';ctx.textAlign='right';
    ctx.fillText(`${c.short}: ${n}`,W-10,ly+2);
  });
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}
