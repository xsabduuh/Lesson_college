<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>مساعد الأستاذ</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== DRAWER ===== -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<nav class="drawer" id="drawer">
  <div class="drawer-head">
    <button class="drawer-close" onclick="closeDrawer()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <h2>مساعد الأستاذ</h2>
    <p>نظام إدارة مركز الدعم</p>
  </div>
  <div id="drawer-content"></div>
</nav>

<div id="app">
  <!-- TOP BAR -->
  <header class="topbar" id="topbar">
    <button class="menu-btn" onclick="openDrawer()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <div class="topbar-title" id="topbar-title">مساعد الأستاذ</div>
    <div class="topbar-right" id="topbar-right">
      <button class="search-btn" onclick="navigate('search')" title="بحث">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <div id="today-badge" style="font-size:11px;font-weight:700;color:var(--text-3);font-family:var(--mono)"></div>
    </div>
  </header>

  <!-- PAGE CONTENT -->
  <div id="page-content">
    <div class="section active" id="sec-dashboard"></div>
    <div class="section" id="sec-students"></div>
    <div class="section" id="sec-lessons"></div>
    <div class="section" id="sec-exercises"></div>
    <div class="section" id="sec-homework"></div>
    <div class="section" id="sec-glossary"></div>
    <div class="section" id="sec-sessions"></div>
    <div class="section" id="sec-attendance"></div>
    <div class="section" id="sec-grades"></div>
    <div class="section" id="sec-payments"></div>
    <div class="section" id="sec-reports"></div>
    <div class="section" id="sec-settings"></div>
    <div class="section" id="sec-student-detail"></div>
    <div class="section" id="sec-search"></div>
    <div class="section" id="sec-data"></div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-nav="dashboard" onclick="navigate('dashboard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/>
        <rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/>
      </svg>
      الرئيسية
    </button>
    <button class="nav-btn" data-nav="students" onclick="navigate('students')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      التلاميذ
      <span class="nav-dot" id="nd-students"></span>
    </button>
    <button class="nav-btn" data-nav="attendance" onclick="navigate('attendance')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 11l3 3L22 4"/>
        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
      </svg>
      الحضور
    </button>
    <button class="nav-btn" data-nav="grades" onclick="navigate('grades')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg>
      النقاط
    </button>
    <button class="nav-btn" data-nav="settings" onclick="navigate('settings')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      الإعدادات
    </button>
  </nav>

  <!-- FAB -->
  <button class="fab" id="main-fab" onclick="handleFab()" style="display:none">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="sheet" id="sheet" onclick="event.stopPropagation()"></div>
</div>

<!-- TOAST -->
<div id="toast-area"></div>
<div id="print-area"></div>
<input type="file" id="import-input" accept="application/json" style="display:none">

<!-- ===== SCRIPTS ===== -->
<script src="icons.js"></script>
<script src="data.js"></script>
<script src="helpers.js"></script>
<script src="router.js"></script>
<script src="drawer.js"></script>
<script src="toast.js"></script>
<script src="dashboard.js"></script>
<script src="students.js"></script>
<script src="student-detail.js"></script>
<script src="attendance.js"></script>
<script src="grades.js"></script>
<script src="sessions.js"></script>
<script src="lessons.js"></script>
<script src="exercises.js"></script>
<script src="homework.js"></script>
<script src="glossary.js"></script>
<script src="payments.js"></script>
<script src="reports.js"></script>
<script src="settings.js"></script>
<script src="search.js"></script>
<script src="data-management.js"></script>
<script src="charts.js"></script>
<script>
  function init(){
    applySettings();
    document.getElementById('today-badge').textContent=today().slice(5).replace('-','/');
    updateBadges();
    const last=localStorage.getItem('lastNav')||'dashboard';
    const [k,e]=last.split('|');
    navHistory=[];
    navigate(k||'dashboard',e||undefined);
  }

  try {
    init();
  } catch (e) {
    document.body.innerHTML =
      "<pre style='padding:20px;color:red;white-space:pre-wrap;background:#fff;'>" +
      e.name + "\n\n" +
      e.message + "\n\n" +
      e.stack +
      "</pre>";
  }
</script>
</body>
</html>
